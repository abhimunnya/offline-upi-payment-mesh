spring.application.name=UPI

# Server
server.port=8080

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/UPI
spring.datasource.username=postgres
spring.datasource.password=abdey6904
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.jpa.properties.hibernate.format_sql=true

spring.main.banner-mode=off


# Logging
logging.level.com.example.UPI=INFO
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n


# UPI Mesh custom properties
upi.mesh.idempotency-ttl-seconds=86400
upi.mesh.packet-max-age-seconds=86400
upi.mesh.clock-skew-tolerance-seconds=300